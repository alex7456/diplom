<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Categorizer - Аналитика</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1e293b;
            min-height: 100vh;
        }
        
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .nav-links a {
            color: #475569;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-links a:hover {
            background: #eef2ff;
            color: #2563eb;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .dashboard-title {
            margin-bottom: 32px;
        }
        
        .dashboard-title h1 {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            border-left: 3px solid #2563eb;
            padding-left: 12px;
        }
        
        .dashboard-title p {
            color: #64748b;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .chart-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: box-shadow 0.2s;
        }
        
        .chart-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        
        .chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        .chart-container {
            position: relative;
            height: 280px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            font-weight: 500;
        }
        
        .export-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-bottom: 24px;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 8px 20px;
            font-size: 13px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .export-btn:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px 16px;
            }
            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Expense Categorizer</div>
        <div class="nav-links">
            <a href="/app">Транзакции</a>
            <a href="/dashboard">Аналитика</a>
            <a href="/history">История</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="dashboard-title">
            <h1>Аналитика расходов</h1>
            <p>Визуализация ваших финансовых привычек</p>
        </div>
        
        <div class="export-buttons">
            <button class="export-btn" onclick="exportData('csv')">Экспорт CSV</button>
            <button class="export-btn" onclick="exportData('excel')">Экспорт Excel</button>
        </div>
        
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-value" id="totalExpenses">—</div>
                <div class="stat-label">Всего расходов (₽)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPerTransaction">—</div>
                <div class="stat-label">Средний чек (₽)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTransactions">—</div>
                <div class="stat-label">Всего транзакций</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Расходы по категориям</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>Динамика по месяцам</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>Топ магазинов</h3>
                <div class="chart-container">
                    <canvas id="merchantChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>Ежедневные расходы</h3>
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let categoryChart, trendChart, merchantChart, dailyChart;
        
        async function exportData(format) {
            window.location.href = `/api/export/${format}?days=90`;
        }
        
        async function loadBreakdown() {
            try {
                const response = await fetch('/api/analytics/breakdown');
                if (response.ok) {
                    const data = await response.json();
                    
                    document.getElementById('totalExpenses').textContent = Math.round(data.total_expenses || 0).toLocaleString();
                    document.getElementById('avgPerTransaction').textContent = Math.round(data.average_per_transaction || 0).toLocaleString();
                    document.getElementById('totalTransactions').textContent = data.total_transactions || 0;
                    
                    const categories = Object.keys(data.categories || {});
                    const amounts = categories.map(c => data.categories[c].total);
// В dashboard.html в функции loadBreakdown() замените colors на:
const colors = [
    '#22c55e', '#3b82f6', '#f97316', '#a855f7', '#0ea5e9',
    '#ec4899', '#06b6d4', '#78716c', '#ef4444', '#d946ef',
    '#8b5cf6', '#64748b', '#14b8a6', '#f43f5e', '#eab308',
    '#84cc16', '#10b981', '#94a3b8'
];                    
                    if (categoryChart) categoryChart.destroy();
                    categoryChart = new Chart(document.getElementById('categoryChart'), {
                        type: 'pie',
                        data: {
                            labels: categories,
                            datasets: [{
                                data: amounts,
                                backgroundColor: colors.slice(0, categories.length),
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading breakdown:', error);
            }
        }
        
        async function loadMonthlyTrend() {
            try {
                const response = await fetch('/api/analytics/monthly?months=6');
                if (response.ok) {
                    const data = await response.json();
                    const months = Object.keys(data);
                    const totals = months.map(m => Object.values(data[m]).reduce((a, b) => a + b, 0));
                    
                    if (trendChart) trendChart.destroy();
                    trendChart = new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Расходы (₽)',
                                data: totals,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59,130,246,0.05)',
                                fill: true,
                                tension: 0.3,
                                pointBackgroundColor: '#3b82f6'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } }
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading monthly trend:', error);
            }
        }
        
        async function loadTopMerchants() {
            try {
                const response = await fetch('/api/analytics/top-merchants?limit=8');
                if (response.ok) {
                    const data = await response.json();
                    const names = data.map(m => m.name);
                    const totals = data.map(m => m.total);
                    
                    if (merchantChart) merchantChart.destroy();
                    merchantChart = new Chart(document.getElementById('merchantChart'), {
                        type: 'bar',
                        data: {
                            labels: names,
                            datasets: [{
                                label: 'Сумма расходов (₽)',
                                data: totals,
                                backgroundColor: '#f59e0b',
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } },
                            scales: { y: { beginAtZero: true } }
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading merchants:', error);
            }
        }
        
        async function loadDailySpending() {
            try {
                const response = await fetch('/api/analytics/daily?days=30');
                if (response.ok) {
                    const data = await response.json();
                    const days = Object.keys(data);
                    const amounts = Object.values(data);
                    
                    if (dailyChart) dailyChart.destroy();
                    dailyChart = new Chart(document.getElementById('dailyChart'), {
                        type: 'bar',
                        data: {
                            labels: days,
                            datasets: [{
                                label: 'Расходы за день (₽)',
                                data: amounts,
                                backgroundColor: '#10b981',
                                borderRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } },
                            scales: { x: { ticks: { maxRotation: 45, minRotation: 45 } }, y: { beginAtZero: true } }
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading daily spending:', error);
            }
        }
        
        loadBreakdown();
        loadMonthlyTrend();
        loadTopMerchants();
        loadDailySpending();
        
        setInterval(() => {
            loadBreakdown();
            loadMonthlyTrend();
            loadTopMerchants();
            loadDailySpending();
        }, 30000);
    </script>
</body>
</html>
